name: GH → GL Backup (staged, parallel)

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.out.outputs.repos }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Discover repos (all includes forks + archived)
        env:
          GH_USER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          node scripts/discover.js > repos.json
      - id: out
        run: echo "repos=$(cat repos.json)" >> $GITHUB_OUTPUT

  backup:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 25
      matrix:
        name: ${{ fromJson(needs.discover.outputs.repos) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Ensure GitLab project exists & force private
        env:
          REPO_NAME: ${{ matrix.name }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_HOST: ${{ secrets.GITLAB_HOST }}
          GITLAB_NAMESPACE: ${{ secrets.GITLAB_NAMESPACE }}
        run: node scripts/ensure.js
      - name: Mirror repo (git push --mirror) with 2x retry
        env:
          REPO_NAME: ${{ matrix.name }}
          GH_USER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_HOST: ${{ secrets.GITLAB_HOST }}
          GITLAB_NAMESPACE: ${{ secrets.GITLAB_NAMESPACE }}
        run: |
          set -e
          node scripts/mirror.js || (echo "retry 1…" && sleep 5 && node scripts/mirror.js) || (echo "retry 2…" && sleep 10 && node scripts/mirror.js)

  notify:
    needs: [discover, backup]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WORKFLOW_STATUS: ${{ (needs.discover.result == 'success' && needs.backup.result == 'success') && 'success' || 'failure' }}
          BACKUP_RESULT: ${{ needs.backup.result }}
        run: |
          if [ -n '${{ needs.discover.outputs.repos }}' ] && [ '${{ needs.discover.outputs.repos }}' != '[]' ]; then
            REPO_COUNT=$(echo '${{ needs.discover.outputs.repos }}' | node -e "process.stdout.write(String(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).length))")
          else
            REPO_COUNT=0
          fi
          export REPO_COUNT
          node scripts/notify.js
